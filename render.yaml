# PAID on Render: starter plan + persistent disk (data kept across deploys).
# For $0 hosting see docs/going-live-free.md (Cloudflare Tunnel) or render.free.yaml (test only).
# Deploy at https://render.com — Blueprint. Vercel: set COMMAND_CENTRE_API_URL to this service URL.

services:
  - type: web
    name: ooi-family-office
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FAMILY_OFFICE_AUTH
        value: sqlite
      - key: FAMILY_OFFICE_SQLITE
        value: /var/data/family-office.sqlite
      - key: FAMILY_OFFICE_VAULT_DIR
        value: /var/data/vault
      - key: FAMILY_OFFICE_MFA_REQUIRED
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: FAMILY_OFFICE_MFA_KEY
        generateValue: true
      - key: FAMILY_OFFICE_CORS_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
    disk:
      name: fo-data
      mountPath: /var/data
      sizeGB: 2
